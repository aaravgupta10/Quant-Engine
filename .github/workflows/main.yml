name: Master Forecasting Engine Pipeline

on:
  schedule:
    # Runs at 02:17 UTC every day (07:47 IST) - random minute to avoid GH Action delays
    - cron: '17 2 * * *'
  workflow_dispatch:
    # Allows manual trigger for debugging/testing

jobs:
  run-engine:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Master Dispatcher
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: |
          python master_dispatcher.py

      - name: Upload Logs/Artifacts (Optional for Debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Generated-Charts
          path: |
            *.png
            *.txt
            *.html
          retention-days: 5
